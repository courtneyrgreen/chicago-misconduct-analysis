<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:ital,wght@0,200..1000;1,200..1000&display=swap"
    rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script>
  // After all Plotly charts on the page have been created, update every chart's
  // hoverlabel font to Nunito Sans. This makes Plotly measure tooltip text in the
  // same font the browser renders (Nunito Sans from the lux theme), so the tooltip
  // box is sized correctly and text does not overflow in Chrome.
  window.addEventListener("load", function () {
    var plots = document.querySelectorAll(".js-plotly-plot");
    plots.forEach(function (plot) {
      try {
        Plotly.relayout(plot, { "hoverlabel.font.family": "Nunito Sans, sans-serif" });
      } catch (e) {}
    });
  });
</script>
